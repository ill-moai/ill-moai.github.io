<!DOCTYPE html>
<html>
<head>
  <title>REPORT GENERATOR</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kumar+One+Outline&display=swap" rel="stylesheet">

  <style>
    body { text-align: center;}
    h1   {font-family: "Kumar One Outline", system-ui;}
    div {
      width: 75%;
      border-style: solid;
      margin: auto;
      text-align: left;
    }  
  </style>
</head>
<body>

<h1>REPORT GENERATOR</h1>

<p>Note: the report corresponding to finals period (from December 12th to February 2nd) is week 4.5.</p>
<p>
  Week: <input type="text" id="wk">
  <button onclick="setweek()"> Submit</button>
</p>

<div>
<p id="this week"></p>
<p id="total"></p>
</div>
<a href="index.html">Go back</a>

<script src=./script/main.js>
</script>

</body>
</html>
